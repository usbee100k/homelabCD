apiVersion: apps/v1
kind: DaemonSet

metadata:

  name: kube-vip

  namespace: kube-system


spec:

  selector:

    matchLabels:

      app: kube-vip


  template:

    metadata:

      labels:

        app: kube-vip


    spec:

      hostNetwork: true


      containers:

      - name: kube-vip

        image: ghcr.io/kube-vip/kube-vip:v0.8.7


        args:

        - manager


        securityContext:

          capabilities:

            add:

            - NET_ADMIN

            - NET_RAW

            - SYS_TIME


        env:

        - name: vip_address

          value: "192.168.50.222"


        - name: vip_interface

          value: "eth0"


        - name: cp_enable

          value: "true"


        - name: svc_enable

          value: "true"