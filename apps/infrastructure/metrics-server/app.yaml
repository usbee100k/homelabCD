apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: metrics-server
  namespace: argocd
  annotations:

    argocd.argoproj.io/sync-wave: "10"


spec:

  project: homelab


  sources:

    - repoURL: https://kubernetes-sigs.github.io/metrics-server/

      chart: metrics-server

      targetRevision: 3.13.0


      helm:

        valueFiles:

          - $values/apps/infrastructure/metrics-server/values.yaml


    - repoURL: REPLACE_ME

      targetRevision: main

      ref: values


  destination:

    server: https://kubernetes.default.svc

    namespace: kube-system


  syncPolicy:

    automated:

      prune: true

      selfHeal: true