apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:

    argocd.argoproj.io/sync-wave: "10"


spec:

  project: homelab


  sources:

    - repoURL: https://kubernetes.github.io/ingress-nginx

      chart: ingress-nginx

      targetRevision: 4.13.0

      helm:
        valueFiles:

          - $values/apps/infrastructure/ingress-nginx/values.yaml


    - repoURL: REPLACE_ME

      targetRevision: main

      ref: values


  destination:

    server: https://kubernetes.default.svc

    namespace: ingress-nginx


  syncPolicy:

    automated:

      prune: true

      selfHeal: true


    syncOptions:

      - CreateNamespace=true