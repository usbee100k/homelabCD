apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:

  name: metallb

  namespace: argocd


spec:

  project: homelab


  sources:


    - repoURL: https://metallb.github.io/metallb

      chart: metallb

      targetRevision: 0.15.2


      helm:

        valueFiles:

          - $values/apps/infrastructure/metallb/values.yaml



    - repoURL: REPLACE_ME

      targetRevision: main

      ref: values


  destination:

    server: https://kubernetes.default.svc

    namespace: metallb-system


  syncPolicy:

    automated:

      prune: true

      selfHeal: true