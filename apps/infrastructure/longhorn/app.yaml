apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: longhorn
  namespace: argocd

spec:

  project: homelab

  sources:

    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: 1.9.0

      helm:
        valueFiles:
          - $values/apps/infrastructure/longhorn/values.yaml


    - repoURL: REPLACE_ME
      targetRevision: main
      ref: values


  destination:

    server: https://kubernetes.default.svc
    namespace: longhorn-system


  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true