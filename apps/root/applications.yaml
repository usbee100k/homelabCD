apiVersion: argoproj.io/v1alpha1
kind: Application


metadata:

  name: applications

  namespace: argocd


  annotations:

    argocd.argoproj.io/sync-wave: "60"


spec:

  project: default


  source:

    repoURL: REPLACE_REPO_URL

    targetRevision: REPLACE_BRANCH

    path: apps/applications


  destination:

    server: https://kubernetes.default.svc

    namespace: argocd


  syncPolicy:

    automated:

      prune: true

      selfHeal: true