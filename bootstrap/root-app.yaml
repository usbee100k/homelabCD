apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: homelab
  namespace: argocd

spec:

  project: homelab

  source:
    repoURL: https://github.com/YOUR_GITHUB_REPO.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:

    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true