apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:

  name: homelab

  namespace: argocd


spec:

  project: homelab


  source:

    repoURL: REPLACE_ME

    targetRevision: main

    path: bootstrap/applications


  destination:

    server: https://kubernetes.default.svc

    namespace: argocd


  syncPolicy:

    automated:

      prune: true

      selfHeal: true


    syncOptions:

      - CreateNamespace=true