apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:

  name: homelab-apps

  namespace: argocd


spec:


  generators:


  - git:

      repoURL: REPLACE_ME

      revision: main


      directories:


      - path: apps/*/*



  template:


    metadata:


      name: '{{path.basename}}'


      annotations:


        argocd.argoproj.io/sync-wave: "50"



    spec:


      project: homelab


      source:


        repoURL: REPLACE_ME


        targetRevision: main


        path: '{{path.path}}'


      destination:


        server: https://kubernetes.default.svc


        namespace: '{{path.basename}}'


      syncPolicy:


        automated:


          prune: true


          selfHeal: true